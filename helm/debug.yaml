# Source: ccs/charts/keycloak-ha/templates/pg-cluster-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: "pg-cluster-ready"
  namespace:  fluid
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: keycloak-postgresql-operator
      containers:
      - name: pg-cluster-readiness
        image: coredgeio/kubectl:1.18.16
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          i=0
          while [ $i -ne 120 ]; do
            i=$(($i+1))
            sleep 5
            kubectl get postgresql -n fluid keycloak-postgresql-cluster -o=jsonpath='{.status.PostgresClusterStatus}' | grep Running
            if [ $? == "0" ]; then
              exit 0
            fi
            echo "Waiting for postgresql cluster to be ready!"
          done
---
# Source: ccs/charts/keycloak-ha/templates/pg-cluster-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: "pg-cluster-cleanup"
  namespace:  fluid
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: keycloak-postgresql-operator
      containers:
      - name: pg-cluster-cleanup
        image: coredgeio/kubectl:1.18.16
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          i=0
          while [ $i -ne 40 ]; do
            i=$(($i+1))
            kubectl delete postgresql -n fluid keycloak-postgresql-cluster --ignore-not-found=true
            output=$(kubectl get pod -n fluid --selector=cluster-name=keycloak-postgresql-cluster --field-selector status.phase=Running | wc -l)            
            if [ "$output" == "0" ]; then
              echo "Postgresql cluster cleanup success!"
              kubectl delete svc -l cluster-name=keycloak-postgresql-cluster -n fluid
              kubectl delete svc --all -n fluid
              exit 0
            fi
            echo "Waiting for postgresql cluster cleanup!"
            sleep 5
          done
