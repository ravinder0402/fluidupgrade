        - name: ACCESS_LOG_VERBOSE
          value: "true"
        - name: COMPASS_JWT_ISSUER_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secretKey
      volumes:
      - name: config-vol
        configMap:
          name: orbiter-auth-config
      - name: gateway-config-vol
        configMap:
          name: gateway-config
      - name: keycloak-secret-vol
        secret:
