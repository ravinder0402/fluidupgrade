  name: compute-service-celery
  namespace: fluid
  labels:
    app: compute-service-celery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compute-service-celery
  template:
    metadata: 
      labels:
        app: compute-service-celery
    spec:
      dnsPolicy: ClusterFirst
      nodeSelector:
        {}
      initContainers:
      - name: postgres-startup
        image: postgres:15
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          until pg_isready -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER
          do
            echo "Waiting for postgres..."
            sleep 1;
          done
        env:
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: ccs-postgres-config
              key: DB_HOST
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: ccs-postgres-config
              key: POSTGRES_USER
        - name: POSTGRES_PORT
          valueFrom:
            secretKeyRef:
              name: ccs-postgres-config
              key: DB_PORT
      containers:
      - name: compute-celery
        image: coredgeio/fluid_platform:2025-06-17
        imagePullPolicy: Always              
        command:
          - "/bin/sh"
          - "-c"
          - "celery -A app  worker --concurrency=2 --loglevel=debug -Q q_compute"
        resources:
          limits:
            cpu: 1000m
            memory: 6Gi
          requests:
            cpu: 100m
            memory: 2Gi
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: platform-api-config   
        # - configMapRef:
        #     name: ccp-monitoring-config
        - configMapRef:
            name: redis-config
        - secretRef:
            name: ccs-postgres-config
        - secretRef:
            name: ccs-auditdb-config
        env:
          - name: ENABLED_MODULES
            value: "compute,resource_metrices,api"     
          - name: POSTGRES_DB
            value: "cloud"
          - name: FLASK_CONFIG
            value: development
          - name: CACHING_ENABLED
            value: "false"
          - name: CONSOLE_PROXY
            value: "http://172.16.109.86:32700"
---
# Source: ccs/charts/container-registry/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: container-registry
  namespace: fluid
spec:
  replicas: 1
  selector:
    matchLabels:
      app: container-registry
  template:
    metadata:
      labels:
        app: container-registry
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: compass-controller
      initContainers:
      - name: mongodb-wait
        image: coredgeio/mongo:5.0.3
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          while true; do
            mongosh --host $MONGODB_SERVICE_SERVICE_HOST -u $MONGO_INITDB_ROOT_USERNAME -p $MONGO_INITDB_ROOT_PASSWORD --eval "rs.status()"
            if [ $? == "0" ]; then
              exit 0
            fi
            echo "waiting for mongodb to start"
            sleep 5
          done
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: configdb-secret
              key: username
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: configdb-secret
              key: password
        - name: MONGODB_SERVICE_SERVICE_HOST
          value: "compass-configdb"
      containers:
      - name: container-registry
        image: coredgeio/orbiter-registry:2025-06-17
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8090
          name: grpc
          protocol: TCP
        env:
        - name: MONGO_DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: configdb-secret
              key: username
        - name: MONGO_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: configdb-secret
              key: password
        volumeMounts:
        - name: registry-config-vol
          mountPath: /opt/config.yml
          subPath: config.yml
      imagePullSecrets:
      - name: fluid-docker-registry-key
      dnsPolicy: ClusterFirst
      volumes:
      - name: registry-config-vol
        configMap:
          name: container-registry-config
---
