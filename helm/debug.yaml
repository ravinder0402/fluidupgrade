    #       claimName: pvc-postgresql-data-partitions
    #       readyOnly: false    
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 10m
      memory: 100Mi
  patroni:
    failsafe_mode: false
    initdb:
      encoding: "UTF8"
      locale: "en_US.UTF-8"
      data-checksums: "true"
    pg_hba:
      - local   all             all                                   trust
      - hostssl all             +zalandos    127.0.0.1/32       pam
      - host    all             all                127.0.0.1/32       md5
      - hostssl all             +zalandos    ::1/128            pam
      - host    all             all                ::1/128            md5
      - local   replication     standby                    trust
      - hostssl replication     standby      all                      md5
      - hostssl all             +zalandos    all                pam
      - hostssl all             all                all                md5

# overwrite custom properties for connection pooler deployments
  connectionPooler:
    numberOfInstances: 1
    mode: "transaction"
    schema: "pooler"
    user: "pooler"
    resources:
      requests:
        cpu: 100m
        memory: 250Mi
      limits:
        cpu: "500m"
        memory: 500Mi

  initContainers:
  - name: date
    image: coredgeio/busybox
    command: [ "/bin/date" ]
